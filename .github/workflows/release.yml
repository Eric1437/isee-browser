# 打包发布:推送 v*.*.* tag 时,在 Windows + Linux 上打包并发布到 GitHub Releases。
# 发布由 softprops/action-gh-release 显式完成(非草稿),不依赖 electron-builder 的 publish。
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  release:
    strategy:
      fail-fast: false # 一个平台失败不影响另一个
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 打包(electron-builder 仅打包,不上传)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish never

      - name: 上传构建产物(便于排查)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.yml
            release/*.AppImage
            release/*.deb
            release/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有平台产物
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: 创建 GitHub Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          # tag 已由推送触发,这里把产物挂到该 tag 对应的 Release(非草稿)。
          files: |
            release/*.exe
            release/*.yml
            release/*.AppImage
            release/*.deb
            release/*.blockmap
          generate_release_notes: true
          draft: false
          prerelease: false
